<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảo trì hệ thống</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        max-width: 500px;
        padding: 30px;
        background: rgba(255,255,255,0.05);
        border-radius: 15px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }

    h1 {
        font-size: 32px;
        margin-bottom: 10px;
    }

    p {
        opacity: 0.8;
    }

    .countdown {
        font-size: 40px;
        margin: 20px 0;
        font-weight: bold;
    }

    .status {
        margin-top: 10px;
        font-size: 14px;
        color: #00ffcc;
    }

    .logo {
        font-size: 20px;
        margin-bottom: 15px;
        opacity: 0.7;
    }
</style>

</head>
<body>

<div class="container">
    <div class="logo">🌐 Website đang bảo trì</div>
    <h1>Bảo trì hệ thống</h1>
    <p>Chúng tôi đang nâng cấp để mang đến trải nghiệm tốt hơn.</p>
    
    <div class="countdown" id="timer">72:00:00</div>
    
    <p>Vui lòng quay lại sau</p>
    <div class="status">⚙️ Dự kiến hoàn tất trong 72 giờ</div>
</div>

<script>
    // Thời gian 72 giờ (tính bằng giây)
    let totalTime = 72 * 60 * 60;

    function updateTimer() {
        let hours = Math.floor(totalTime / 3600);
        let minutes = Math.floor((totalTime % 3600) / 60);
        let seconds = totalTime % 60;

        document.getElementById("timer").innerText =
            String(hours).padStart(2, '0') + ":" +
            String(minutes).padStart(2, '0') + ":" +
            String(seconds).padStart(2, '0');

        if (totalTime > 0) {
            totalTime--;
        }
    }

    setInterval(updateTimer, 1000);
</script>

</body>
</html>
